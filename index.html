
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lotto Bulk Buy - Option 2 Sound</title>
<style>
body { font-family: Arial; padding: 20px; }
.slider-container { margin-top: 40px; }
</style>
</head>
<body>

<h2>Bulk Buy Slider (Option 2 - Clean Click)</h2>

<div class="slider-container">
  <input type="range" min="10" max="10000" step="10" value="100" id="ticketSlider">
  <p><strong id="ticketValue">100 tickets</strong></p>
</div>

<audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<script>
const slider = document.getElementById("ticketSlider");
const valueDisplay = document.getElementById("ticketValue");
const clickSound = document.getElementById("clickSound");

slider.addEventListener("input", () => {
  valueDisplay.textContent = slider.value + " tickets";
});

// Only play ONE clean click when user releases slider
slider.addEventListener("change", () => {
  clickSound.currentTime = 0;
  clickSound.volume = 0.2;
  clickSound.play();
});
</script>

</body>
</html>
